services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freshops
      POSTGRES_PASSWORD: freshops
      POSTGRES_DB: freshops
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshops -d freshops"]
      interval: 2s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 3s
      retries: 20
